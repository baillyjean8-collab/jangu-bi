<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paroisses – JANGU BI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f4f0; }

    :root {
      --gold: #B8941F;
      --gold-light: #F5ECC7;
      --gold-dark: #7A600F;
      --green-dark: #1A2E1A;
      --green-mid: #2D4A2D;
      --red: #C0392B;
      --green-open: #27AE60;
      --bg: #ffffff;
      --bg-secondary: #f8f8f5;
      --border: rgba(0,0,0,0.10);
      --border-mid: rgba(0,0,0,0.18);
      --text-primary: #111;
      --text-secondary: #555;
      --text-tertiary: #999;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --bg-secondary: #242424;
        --border: rgba(255,255,255,0.10);
        --border-mid: rgba(255,255,255,0.18);
        --text-primary: #f0f0f0;
        --text-secondary: #aaa;
        --text-tertiary: #666;
      }
      body { background: #111; }
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      background: var(--bg);
      min-height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* ── PAGES ── */
    .page { display: none; flex-direction: column; flex: 1; }
    .page.active { display: flex; }

    /* ── SCROLLABLE CONTENT ── */
    .scroll-area { flex: 1; overflow-y: auto; padding-bottom: 70px; }

    /* ── LIST HEADER ── */
    .list-header {
      background: var(--green-dark);
      color: #fff;
      padding: 18px 16px 14px;
      flex-shrink: 0;
    }
    .list-header h1 {
      font-size: 22px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .list-header h1 i { color: var(--gold); font-size: 24px; }
    .list-header p { font-size: 13px; color: #a0b8a0; margin-top: 3px; }

    /* ── SEARCH ── */
    .search-bar { margin: 12px 16px 4px; position: relative; }
    .search-bar input {
      width: 100%;
      padding: 10px 12px 10px 38px;
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-lg);
      font-size: 14px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      outline: none;
    }
    .search-bar input:focus { border-color: var(--gold); }
    .search-bar .si {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      font-size: 18px;
      pointer-events: none;
    }

    /* ── FILTER TABS ── */
    .filter-tabs {
      display: flex;
      gap: 8px;
      padding: 10px 16px 8px;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
    }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      border: 0.5px solid var(--border-mid);
      cursor: pointer;
      white-space: nowrap;
      background: var(--bg);
      color: var(--text-secondary);
      transition: all 0.15s;
    }
    .tab.active { background: var(--green-dark); color: #fff; border-color: var(--green-dark); }

    /* ── COUNT ── */
    .count-info {
      font-size: 12px;
      color: var(--text-tertiary);
      padding: 0 16px 6px;
    }

    /* ── PARISH CARDS ── */
    .parish-list { padding: 0 16px; }
    .parish-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .parish-card:hover { border-color: var(--border-mid); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card-top { display: flex; align-items: flex-start; gap: 12px; }
    .parish-icon {
      width: 44px;
      height: 44px;
      background: var(--green-dark);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .parish-icon i { color: var(--gold); font-size: 22px; }
    .card-info { flex: 1; min-width: 0; }
    .card-info h3 { font-size: 14px; font-weight: 600; color: var(--text-primary); line-height: 1.3; }
    .card-info .loc { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
    .dist { font-size: 13px; font-weight: 600; color: var(--gold); flex-shrink: 0; }
    .status-row { margin: 8px 0 10px; display: flex; align-items: center; gap: 8px; }
    .status { font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
    .status.open { color: var(--green-open); }
    .status.closed { color: var(--red); }
    .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .dot.open { background: var(--green-open); }
    .dot.closed { background: var(--red); }
    .hours { font-size: 12px; color: var(--text-secondary); }
    .card-btns { display: flex; gap: 8px; }
    .btn-sm {
      flex: 1;
      padding: 8px 4px;
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      background: transparent;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: background 0.15s;
    }
    .btn-sm:hover { background: var(--bg-secondary); }
    .btn-sm.follow { background: var(--green-dark); color: #fff; border-color: var(--green-dark); }
    .btn-sm.following { background: transparent; color: var(--green-open); border-color: var(--green-open); }

    /* ── TYPE BADGES ── */
    .type-badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 6px;
      vertical-align: middle;
      font-weight: 500;
    }
    .type-cathedral { background: var(--gold-light); color: var(--gold-dark); }
    .type-parish { background: #e8f5e9; color: #1b5e20; }
    .type-chapel { background: #e3f2fd; color: #0d47a1; }
    .type-basilica { background: #fce4ec; color: #880e4f; }

    /* ── DETAIL HEADER ── */
    .detail-header {
      background: var(--green-dark);
      padding: 16px;
      color: #fff;
      flex-shrink: 0;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: #a0b8a0;
      cursor: pointer;
      margin-bottom: 12px;
      border: none;
      background: none;
      padding: 0;
    }
    .back-btn:hover { color: #fff; }
    .detail-header h2 { font-size: 18px; font-weight: 600; line-height: 1.3; }
    .detail-header .d-loc { font-size: 13px; color: #a0b8a0; margin-top: 4px; }
    .detail-header .d-type-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 10px;
      display: inline-block;
      margin-top: 8px;
      font-weight: 500;
    }

    /* ── DETAIL BODY ── */
    .detail-body { padding: 16px; }
    .detail-icon-block {
      width: 68px;
      height: 68px;
      background: var(--green-dark);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .detail-icon-block i { color: var(--gold); font-size: 34px; }
    .info-section { margin-bottom: 20px; }
    .info-section h4 {
      font-size: 11px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 0.5px solid var(--border);
      font-size: 14px;
      color: var(--text-primary);
    }
    .info-row:last-child { border-bottom: none; }
    .info-row i { color: var(--text-secondary); font-size: 18px; width: 22px; flex-shrink: 0; margin-top: 1px; }
    .info-row .lbl { color: var(--text-secondary); font-size: 13px; min-width: 82px; flex-shrink: 0; }
    .info-row .val { flex: 1; font-size: 14px; }
    .d-status.open { color: var(--green-open); font-weight: 600; }
    .d-status.closed { color: var(--red); font-weight: 600; }
    .mass-times { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .mass-time {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }
    .desc-block {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 14px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-bottom: 18px;
      border: 0.5px solid var(--border);
    }
    .action-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
    .action-btn {
      width: 100%;
      padding: 13px;
      border-radius: var(--radius-lg);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 0.5px solid var(--border-mid);
      transition: opacity 0.15s, transform 0.1s;
    }
    .action-btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--green-dark); color: #fff; border-color: var(--green-dark); }
    .btn-gold { background: var(--gold); color: #fff; border-color: var(--gold); }
    .btn-outline { background: transparent; color: var(--text-primary); }
    .btn-outline.following { color: var(--green-open); border-color: var(--green-open); }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: var(--bg);
      border-top: 0.5px solid var(--border-mid);
      display: flex;
      padding: 8px 0 6px;
      z-index: 100;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      padding: 4px 0;
      font-size: 10px;
      color: var(--text-secondary);
      border: none;
      background: none;
      transition: color 0.15s;
    }
    .nav-item.active { color: var(--gold); }
    .nav-item i { font-size: 22px; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--green-dark);
      color: #fff;
      padding: 9px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
      max-width: 90vw;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── NO RESULTS ── */
    .no-results {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .no-results i { font-size: 36px; color: var(--text-tertiary); margin-bottom: 10px; display: block; }
  </style>
</head>

<div class="app">

  <!-- ════════════════════════════════════════
       PAGE : LISTE DES PAROISSES
  ════════════════════════════════════════ -->
  <div id="page-list" class="page active">

    </nav>
  </div>

  <!-- ════════════════════════════════════════

  <div id="page-detail" class="page">

        </div>

        <div class="info-section">
          <h4>Informations pratiques</h4>
          <div class="info-row">
            <i class="ti ti-clock"></i>
            <span class="lbl">Statut</span>
            <span class="val d-status" id="d-status"></span>
          </div>
          <div class="info-row">
            <i class="ti ti-door-enter"></i>
            <span class="lbl">Horaires</span>

          <div class="info-row">

            <i class="ti ti-phone"></i>

          <div class="info-row">
            <i class="ti ti-map-2"></i>
            <span class="lbl">Diocèse</span>
            <span class="val" id="d-diocese"></span>
          </div>
        </div>

        <div class="info-section">
          <h4>Messes dominicales</h4>
          <div class="mass-times" id="d-masses"></div>
        </div>

        <div class="action-btns">

            <i class="ti ti-map-pin"></i> Itinéraire

          <button class="action-btn btn-gold" id="btn-appeler" onclick="callParish()">

          </button>
          <button class="action-btn btn-outline" id="btn-suivre" onclick="toggleFollow()">
            <i class="ti ti-heart"></i>
            <span id="btn-suivre-label">Suivre</span>
          </button>
        </div>
      </div>
    </div>

    <nav class="bottom-nav" aria-label="Navigation principale">

      </button>
      <button class="nav-item" onclick="showToast('Live indisponible pour l\'instant')" aria-label="Live">
        <i class="ti ti-broadcast"></i><span>Live</span>
      </button>
      <button class="nav-item" onclick="showToast('Section Catéchèse à venir')" aria-label="Catéchèse">
        <i class="ti ti-cross"></i><span>Catéchèse</span>
      </button>
      <button class="nav-item" onclick="showToast('Vos demandes sacramentelles')" aria-label="Demandes">
        <i class="ti ti-list-check"></i><span>Demandes</span>
      </button>
    </nav>
  </div>

</div><!-- /.app -->

<div class="toast" id="toast" role="status" aria-live="polite"></div>

/* ────────────────────────────────────────
   STATE
──────────────────────────────────────── */
let followed      = new Set();
let currentParish = null;
let currentFilter = 'Toutes';

/* ────────────────────────────────────────
   HELPERS
──────────────────────────────────────── */
function getTypeBadge(type) {
  const labels = { cathedral:'Cathédrale', parish:'Paroisse', chapel:'Chapelle', basilica:'Basilique' };
  const cls    = { cathedral:'type-cathedral', parish:'type-parish', chapel:'type-chapel', basilica:'type-basilica' };
  return `<span class="type-badge ${cls[type]||''}">${labels[type]||type}</span>`;
}

function getTypeClass(type) {
  return { cathedral:'type-cathedral', parish:'type-parish', chapel:'type-chapel', basilica:'type-basilica' }[type] || '';
}

/* ────────────────────────────────────────
   FILTERING
──────────────────────────────────────── */
function filterParishes() { renderList(); }

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function getFiltered() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  return parishes.filter(p => {
    const matchSearch = !q || p.name.toLowerCase().includes(q) || p.loc.toLowerCase().includes(q);
    let   matchFilter = true;
    if      (currentFilter === 'Cathédrales') matchFilter = p.type === 'cathedral' || p.type === 'basilica';
    else if (currentFilter !== 'Toutes')      matchFilter = p.region === currentFilter;
    return matchSearch && matchFilter;
  });
}

/* ────────────────────────────────────────
   RENDER LIST
──────────────────────────────────────── */
function renderList() {
  const listEl   = document.getElementById('parish-list');
  const filtered = getFiltered();
  const n        = filtered.length;
  document.getElementById('count-info').textContent =
    `${n} lieu${n > 1 ? 'x' : ''} trouvé${n > 1 ? 's' : ''}`;

  if (!n) {
    listEl.innerHTML = `
      <div class="no-results">
        <i class="ti ti-search"></i>
        <p>Aucune paroisse trouvée</p>
      </div>`;
    return;
  }

  listEl.innerHTML = filtered.map(p => `
    <div class="parish-card" onclick="showDetail(${p.id})" tabindex="0"
         onkeypress="if(event.key==='Enter')showDetail(${p.id})"
         role="button" aria-label="Voir ${p.name}">
      <div class="card-top">
        <div class="parish-icon"><i class="ti ti-building-church" aria-hidden="true"></i></div>
        <div class="card-info">
          <h3>${p.name}${getTypeBadge(p.type)}</h3>
          <div class="loc">${p.loc}</div>
        </div>
        <div class="dist">${p.dist}</div>
      </div>
      <div class="status-row">
        <span class="dot ${p.open ? 'open' : 'closed'}" aria-hidden="true"></span>
        <span class="status ${p.open ? 'open' : 'closed'}">${p.open ? 'Ouvert' : 'Fermé'}</span>
        <span class="hours">${p.hours}</span>
      </div>
      <div class="card-btns" onclick="event.stopPropagation()">
        <button class="btn-sm" onclick="openMap(${p.id})" aria-label="Itinéraire vers ${p.name}">
          <i class="ti ti-map-pin" aria-hidden="true"></i> Itinéraire
        </button>
        <button class="btn-sm" onclick="callFromList(${p.id})" aria-label="Appeler ${p.name}">
          <i class="ti ti-phone" aria-hidden="true"></i> Appeler
        </button>
        <button class="btn-sm ${followed.has(p.id) ? 'following' : 'follow'}"
                id="follow-${p.id}"
                onclick="toggleFollowFromList(${p.id})"
                aria-label="${followed.has(p.id) ? 'Ne plus suivre' : 'Suivre'} ${p.name}">
          <i class="ti ti-heart" aria-hidden="true"></i>
          ${followed.has(p.id) ? 'Suivi' : 'Suivre'}
        </button>
      </div>
    </div>
  `).join('');
}

/* ────────────────────────────────────────
   DETAIL PAGE
──────────────────────────────────────── */
function showDetail(id) {
  currentParish = parishes.find(p => p.id === id);
  if (!currentParish) return;
  const p = currentParish;

  document.getElementById('d-name').textContent = p.name;
  document.getElementById('d-loc').textContent  = p.loc;
  document.getElementById('d-desc').textContent = p.desc;
  document.getElementById('d-hours').textContent   = p.hours;
  document.getElementById('d-address').textContent = p.address;
  document.getElementById('d-phone').textContent   = p.phone;
  document.getElementById('d-diocese').textContent = p.diocese;

  const typeLabels = { cathedral:'Cathédrale', parish:'Paroisse', chapel:'Chapelle', basilica:'Basilique Mineure' };
  const tb = document.getElementById('d-type-badge');
  tb.textContent = typeLabels[p.type] || p.type;
  tb.className   = 'd-type-badge type-badge ' + getTypeClass(p.type);

  const st = document.getElementById('d-status');
  st.textContent = p.open ? 'Ouvert' : 'Fermé';
  st.className   = 'd-status ' + (p.open ? 'open' : 'closed');

  document.getElementById('d-masses').innerHTML =
    p.masses.map(m => `<span class="mass-time">${m}</span>`).join('');

  _refreshFollowBtn();

  document.getElementById('page-list').classList.remove('active');
  document.getElementById('page-detail').classList.add('active');
  document.querySelector('.app').scrollTop = 0;
}

function showList() {
  document.getElementById('page-detail').classList.remove('active');
  document.getElementById('page-list').classList.add('active');
}

/* ────────────────────────────────────────
   ACTIONS
──────────────────────────────────────── */
function openItinerary() {
  if (!currentParish) return;
  const q = encodeURIComponent(currentParish.address || currentParish.name + ' ' + currentParish.loc);
  window.open('https://www.google.com/maps/search/?api=1&query=' + q, '_blank');
  showToast('Ouverture de Google Maps…');
}

function openMap(id) {
  const p = parishes.find(x => x.id === id);
  if (!p) return;
  const q = encodeURIComponent(p.address || p.name + ' ' + p.loc);
  window.open('https://www.google.com/maps/search/?api=1&query=' + q, '_blank');
  showToast('Ouverture de Google Maps…');
}

function callParish() {
  if (!currentParish) return;
  window.location.href = 'tel:' + currentParish.phone.replace(/\s/g, '');
  showToast('Appel en cours…');
}

function callFromList(id) {
  const p = parishes.find(x => x.id === id);
  if (!p) return;
  window.location.href = 'tel:' + p.phone.replace(/\s/g, '');
  showToast('Appel en cours…');
}

function toggleFollow() {
  if (!currentParish) return;
  const id = currentParish.id;
  followed.has(id) ? followed.delete(id) : followed.add(id);
  showToast(followed.has(id) ? 'Paroisse ajoutée aux favoris ♥' : 'Retiré des favoris');
  _refreshFollowBtn();
}

function toggleFollowFromList(id) {
  followed.has(id) ? followed.delete(id) : followed.add(id);
  showToast(followed.has(id) ? 'Paroisse ajoutée aux favoris ♥' : 'Retiré des favoris');
  const btn = document.getElementById('follow-' + id);
  if (btn) {
    btn.className = 'btn-sm ' + (followed.has(id) ? 'following' : 'follow');
    btn.innerHTML = `<i class="ti ti-heart" aria-hidden="true"></i> ${followed.has(id) ? 'Suivi' : 'Suivre'}`;
    btn.setAttribute('aria-label', (followed.has(id) ? 'Ne plus suivre ' : 'Suivre ') + (parishes.find(p=>p.id===id)||{}).name);
  }
}

function _refreshFollowBtn() {
  if (!currentParish) return;
  const isFollowed = followed.has(currentParish.id);
  const btn   = document.getElementById('btn-suivre');
  const label = document.getElementById('btn-suivre-label');
  label.textContent = isFollowed ? 'Suivi ✓' : 'Suivre';
  if (isFollowed) {
    btn.classList.add('following');
  } else {
    btn.classList.remove('following');
  }
}

/* ────────────────────────────────────────
   TOAST
──────────────────────────────────────── */
let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

/* ────────────────────────────────────────
   INIT
──────────────────────────────────────── */
renderList();
</script>
