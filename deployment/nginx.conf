# ═══════════════════════════════════════════════════════════════════
# JANGU BI — Nginx Production Configuration
# 
# Prerequisites:
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo certbot --nginx -d api.jangubi.com -d app.jangubi.com
#
# Deploy:
#   sudo cp nginx.conf /etc/nginx/sites-available/jangubi
#   sudo ln -s /etc/nginx/sites-available/jangubi /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════════════════

# ── Rate limit zones (defined in http context, used in server blocks) ──────────
# These complement Express rate limiting with a network-level defense.
limit_req_zone $binary_remote_addr zone=api:10m       rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m      rate=3r/m;
limit_req_zone $binary_remote_addr zone=webhook:10m   rate=30r/s;
limit_req_zone $binary_remote_addr zone=static:10m    rate=50r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── Upstream: Node.js app server ────────────────────────────────────────────────
upstream node_app {
    server 127.0.0.1:5000;
    keepalive 32;              # Persistent connections to upstream
}

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.jangubi.com app.jangubi.com;

    # Let's Encrypt challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── API Server (api.jangubi.com) ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.jangubi.com;

    # ── TLS Configuration ─────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.jangubi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.jangubi.com/privkey.pem;

    # Modern TLS — disable SSLv3, TLSv1, TLSv1.1 (vulnerable)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Strong cipher suite — forward secrecy preferred
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # Session resumption — performance without sacrificing forward secrecy
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_tickets off;

    # OCSP Stapling — faster TLS handshake
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # DH params (generate: openssl dhparam -out /etc/ssl/dhparam.pem 4096)
    ssl_dhparam /etc/ssl/dhparam.pem;

    # ── Security Headers ──────────────────────────────────────────────────────
    # HSTS — tell browsers to only use HTTPS for 1 year (including subdomains)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Deny iframe embedding (clickjacking protection)
    add_header X-Frame-Options "DENY" always;

    # XSS protection header (legacy browsers)
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer policy — don't leak URL paths in Referer header
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions policy — disable unused browser APIs
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # ── Global request limits ─────────────────────────────────────────────────
    client_max_body_size 1m;              # Max request body
    client_body_timeout  10s;             # Reject slow body uploads (slowloris)
    client_header_timeout 10s;
    keepalive_timeout    65s;
    send_timeout         10s;

    # Max connections per IP
    limit_conn conn_limit 20;

    # ── Upstream proxy settings ───────────────────────────────────────────────
    proxy_http_version  1.1;
    proxy_set_header    Upgrade $http_upgrade;
    proxy_set_header    Connection "upgrade";
    proxy_set_header    Host $host;
    proxy_set_header    X-Real-IP $remote_addr;
    proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto $scheme;
    proxy_cache_bypass  $http_upgrade;

    # Timeouts for upstream
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # Buffer settings — prevent buffering for SSE/streaming
    proxy_buffering off;

    # Hide upstream headers that leak info
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # ── Auth endpoints — very strict rate limiting ─────────────────────────────
    location ~ ^/api/auth/(login|register|send-otp|verify-otp) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://node_app;
    }

    # ── Webhook endpoints — provider IP whitelist (add your providers' CIDRs) ──
    location ~ ^/api/donations/webhook/ {
        # Uncomment and fill in provider IP ranges in production:
        # allow 41.82.0.0/16;    # CinetPay IP range (example)
        # allow 196.216.0.0/16;  # Wave IP range (example)
        # deny all;

        limit_req zone=webhook burst=50 nodelay;
        proxy_pass http://node_app;
    }

    # ── Socket.io — WebSocket upgrade ─────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://node_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Longer timeouts for long-lived WS connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # No rate limit for socket — handled in Node
    }

    # ── Health check — no rate limit, no logging ───────────────────────────────
    location /health {
        access_log off;
        proxy_pass http://node_app;
    }

    # ── General API ───────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://node_app;
    }

    # ── Block common vulnerability scanners ────────────────────────────────────
    location ~ \.(php|asp|aspx|jsp|cgi|env|git|svn|htaccess|htpasswd)$ {
        return 404;
    }

    # Block requests with no Host header (scanner behavior)
    if ($host = "") {
        return 444;
    }
}

# ── Frontend App (app.jangubi.com) ──────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.jangubi.com;

    ssl_certificate     /etc/letsencrypt/live/app.jangubi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.jangubi.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' wss://api.jangubi.com;" always;

    root /var/www/jangubi-client/dist;
    index index.html;

    # Static assets — aggressive caching (content-hashed filenames)
    location /assets/ {
        limit_req zone=static burst=100 nodelay;
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # SPA fallback — all routes serve index.html (React Router handles routing)
    location / {
        limit_req zone=static burst=50 nodelay;
        try_files $file $uri/index.html /index.html;

        # No cache for index.html (always fetch latest app shell)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
