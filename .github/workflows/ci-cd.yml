name: JANGU BI — CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ════════════════════════════════════════════
  # JOB 1: Security & Quality Checks
  # ════════════════════════════════════════════
  security-check:
    name: Security & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      # Audit dependencies for known CVEs
      - name: npm security audit
        working-directory: server
        run: npm audit --audit-level=high
        # Fails CI if HIGH or CRITICAL vulnerabilities found

      # Check for hardcoded secrets (blocks push if found)
      - name: Scan for hardcoded secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      # Lint
      - name: ESLint
        working-directory: server
        run: npm run lint --if-present

  # ════════════════════════════════════════════
  # JOB 2: Backend Tests
  # ════════════════════════════════════════════
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: security-check

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      MONGODB_URI: mongodb://localhost:27017/jangubi_test
      JWT_ACCESS_SECRET: test-access-secret-minimum-32-characters-long
      JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-characters-long
      OTP_HMAC_SECRET: test-otp-hmac-secret-minimum-32-characters-long
      CLIENT_URL: http://localhost:5173
      PORT: 5001

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run tests
        working-directory: server
        run: npm test

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          directory: server/coverage
        continue-on-error: true

  # ════════════════════════════════════════════
  # JOB 3: Frontend Build
  # ════════════════════════════════════════════
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: security-check

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build production bundle
        working-directory: client
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # Verify build output exists and is non-empty
      - name: Verify build output
        run: |
          if [ ! -f "client/dist/index.html" ]; then
            echo "❌ Build failed: index.html not found"
            exit 1
          fi
          echo "✅ Build size: $(du -sh client/dist | cut -f1)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/
          retention-days: 7

  # ════════════════════════════════════════════
  # JOB 4: Deploy to Staging (push to staging branch)
  # ════════════════════════════════════════════
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist/

      - name: Deploy to Render (staging)
        run: |
          curl -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"ref": "staging"}'
        # Render auto-deploys from git — this hook triggers immediately

      - name: Smoke test staging
        run: |
          sleep 30  # Wait for deploy to complete
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.STAGING_API_URL }}/health")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Staging health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "✅ Staging health check passed"

  # ════════════════════════════════════════════
  # JOB 5: Deploy to Production (push to main)
  # ════════════════════════════════════════════
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production   # Requires manual approval in GitHub Environments

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist/

      # Deploy server via SSH to VPS (Render/Railway alternative)
      - name: Deploy server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /var/www/jangubi-server

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Install production deps only
            npm ci --omit=dev

            # Zero-downtime reload via PM2
            pm2 reload ecosystem.config.cjs --update-env

            echo "✅ Server deployed"

      # Deploy frontend static files
      - name: Deploy frontend via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            rm -rf /var/www/jangubi-client/dist
            mkdir -p /var/www/jangubi-client/dist

      - name: Upload frontend build
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          source:   "client/dist/*"
          target:   "/var/www/jangubi-client/"
          strip_components: 2

      - name: Reload Nginx & smoke test
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            sudo nginx -t && sudo systemctl reload nginx

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://api.jangubi.com/health)
            if [ "$STATUS" != "200" ]; then
              echo "❌ Production health check failed"
              exit 1
            fi
            echo "✅ Production deployed and healthy"

      - name: Notify deployment
        if: always()
        run: |
          echo "Deployment status: ${{ job.status }}"
          # TODO: notify Slack/Discord webhook
